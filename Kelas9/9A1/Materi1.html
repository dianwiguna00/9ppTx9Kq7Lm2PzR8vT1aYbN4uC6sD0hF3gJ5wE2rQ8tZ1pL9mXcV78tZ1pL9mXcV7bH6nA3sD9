<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 1</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
  {
    id: 'pemantik',
    title: '💡 Pemantik',
    color: 'pemantik',
    text: [
      'Pernahkah kamu melihat ukuran layar ponsel, luas kamar, atau ukuran akuarium dan bertanya bagaimana cara menghitungnya dengan tepat?',
      'Saat menghitung jarak atau luas suatu benda, mengapa terkadang muncul bilangan pangkat atau bentuk akar?'
    ]
  },
  {
    id: 'kontekstual',
    title: '🌍 Penerapan Kontekstual',
    color: 'kontekstual',
    text: [
      'Menghitung luas lantai kamar atau halaman rumah yang berbentuk persegi.',
      'Menentukan panjang sisi atau diagonal benda seperti buku, meja, atau layar ponsel.',
      'Memahami penggunaan bilangan berpangkat pada jumlah benda atau daya listrik.',
      'Memperkirakan ukuran dan jarak dalam kegiatan sehari-hari, seperti olahraga atau penataan ruang.'
    ]
  },
  {
    id: 'tujuan',
    title: '🎯 Tujuan Pembelajaran',
    color: 'tujuan',
    text: [
      'Siswa dapat menjelaskan konsep bilangan berpangkat dan bentuk akar serta mengidentifikasi penerapannya dalam kehidupan sehari-hari.'
    ]
  },
  {
    id: 'aktivitas',
    title: '📚 Aktivitas Inti',
    color: 'aktivitas',
    text: [
      'Mengamati benda di sekitar kelas atau rumah yang berkaitan dengan luas, sisi, atau jarak.',
      'Berdiskusi dalam kelompok untuk mengaitkan benda tersebut dengan bilangan berpangkat dan bentuk akar.',
      'Mengerjakan latihan sederhana berdasarkan hasil pengamatan dan diskusi.',
      'Menyampaikan hasil kerja kelompok dan menanggapi pendapat teman secara aktif.'
    ]
  },
  {
    id: 'konsep',
    title: '🧠 Pemahaman Konsep',
    color: 'konsep',
    text: [
      '1. Bilangan Berpangkat:',
      'Bilangan berpangkat adalah bilangan yang ditulis dalam bentuk:',
      'aⁿ = a × a × ... × a (sebanyak n kali)',
      'Contoh:',
      '2³ = 2 × 2 × 2 = 8',
      '2. Bentuk Akar:',
      'Bentuk akar adalah kebalikan dari bilangan berpangkat. Akar kuadrat dari suatu bilangan adalah bilangan yang jika dikuadratkan menghasilkan bilangan tersebut.',
      'Contoh:',
      '√25 = 5, karena 5² = 25',
      '3. Penerapan dalam Kehidupan:',
      'Bilangan berpangkat digunakan dalam menghitung luas dan volume, pertumbuhan populasi, dan notasi ilmiah.',
      'Bentuk akar digunakan dalam pengukuran diagonal, jarak, dan rumus Pythagoras.'
    ]
  },
  {
    id: 'contoh',
    title: '✍️ Contoh Soal',
    color: 'contoh',
    text: [
      'Contoh Soal 1: Bilangan Berpangkat:',
      'Sebuah bakteri membelah diri menjadi dua setiap jam. Jika awalnya ada 1 bakteri, berapa banyak bakteri setelah 5 jam?',
      'Penyelesaian:',
      '2⁵ = 32',
      'Contoh Soal 2: Bentuk Akar:',
      'Sebuah taman berbentuk persegi memiliki luas 81 m². Berapa panjang sisi taman tersebut?',
      'Penyelesaian:',
      '√81 = 9 meter'
    ]
  },
  {
    id: 'latihan',
    title: '📝 Latihan Soal',
    color: 'latihan',
    text: [
      'Hitung hasil dari:',
      'a. 3⁴',
      'b. 10²',
      'c. √64',
      'd. √121',
      'Seorang petani menanam pohon yang jumlahnya berlipat dua setiap minggu. Jika minggu pertama ada 2 pohon, berapa pohon setelah 4 minggu?',
      'Sebuah layar TV berbentuk persegi memiliki luas 100 cm². Berapa panjang sisi layar tersebut?'
    ]
  },
  {
    id: 'refleksi',
    title: '🔍 Refleksi Pembelajaran',
    color: 'refleksi',
    text: [
      'Di mana kamu pernah melihat atau menggunakan bilangan berpangkat atau bentuk akar dalam kehidupan sehari-hari?',
      'Apa manfaat memahami konsep ini dalam pelajaran lain atau kehidupan nyata?'
    ]
  }
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
