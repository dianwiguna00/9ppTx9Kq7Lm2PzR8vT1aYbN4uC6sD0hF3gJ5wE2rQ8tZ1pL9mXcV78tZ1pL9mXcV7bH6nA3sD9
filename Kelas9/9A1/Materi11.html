<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 11</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
  {
    id: 'pemantik',
    title: '💡 Pemantik',
    color: 'pemantik',
    text: [
      'Pernahkah kamu bercermin dan melihat bayangan tubuhmu tampak sama tetapi posisinya terbalik?',
      'Mengapa menurutmu suatu bentuk bisa dipindahkan, diputar, atau diperbesar tanpa mengubah bentuk aslinya?'
    ]
  },
  {
    id: 'kontekstual',
    title: '🌍 Penerapan Kontekstual',
    color: 'kontekstual',
    text: [
      'Mengamati bayangan pada cermin, genangan air, atau permukaan kaca sebagai contoh pencerminan.',
      'Melihat pergeseran gambar atau ikon pada layar ponsel dan komputer.',
      'Memahami perputaran benda seperti jarum jam, roda, atau kipas angin.',
      'Mengamati perubahan ukuran gambar saat diperbesar atau diperkecil pada aplikasi.'
    ]
  },
  {
    id: 'tujuan',
    title: '🎯 Tujuan Pembelajaran',
    color: 'tujuan',
    text: [
      'Siswa dapat menjelaskan konsep dasar transformasi geometri (refleksi, translasi, rotasi, dan dilatasi) serta mengenali karakteristik masing-masing jenis transformasi.'
    ]
  },
  {
    id: 'aktivitas',
    title: '📚 Aktivitas Inti',
    color: 'aktivitas',
    text: [
      'Mengamati gambar atau benda yang mengalami pencerminan, pergeseran, perputaran, dan perubahan ukuran.',
      'Berdiskusi dalam kelompok untuk mengidentifikasi jenis transformasi yang terjadi.',
      'Mengerjakan latihan sederhana mengelompokkan transformasi berdasarkan cirinya.',
      'Menyampaikan hasil diskusi dan contoh temuan transformasi di sekitar siswa.'
    ]
  },
  {
    id: 'konsep',
    title: '🧠 Pemahaman Konsep',
    color: 'konsep',
    text: [
      'Transformasi geometri adalah perubahan posisi atau ukuran suatu bangun geometri pada bidang datar. Ada empat jenis utama:',
      '1. Refleksi (Pencerminan):',
      'Mencerminkan bangun terhadap garis tertentu (sumbu x, sumbu y, atau garis lainnya).',
      'Hasilnya adalah bayangan simetris.',
      '2. Translasi (Perpindahan):',
      'Memindahkan bangun sejauh vektor tertentu tanpa mengubah bentuk atau ukuran.',
      '3. Rotasi (Perputaran):',
      'Memutar bangun terhadap titik pusat dengan sudut tertentu (misalnya 90°, 180°).',
      '4. Dilatasi (Perkalian Skala):',
      'Mengubah ukuran bangun dengan faktor skala, bisa memperbesar atau memperkecil.'
    ]
  },
  {
    id: 'contoh',
    title: '✍️ Contoh Soal',
    color: 'contoh',
    text: [
      'Contoh Soal 1: Refleksi:',
      'Titik A(3, 4) direfleksikan terhadap sumbu x. Tentukan koordinat bayangannya.',
      'Penyelesaian:',
      "Refleksi terhadap sumbu x → ubah tanda y: A'(3, -4)",
      'Contoh Soal 2: Translasi:',
      'Titik B(-2, 5) ditranslasikan oleh vektor (3, -2). Tentukan koordinat hasil translasi.',
      'Penyelesaian:',
      "B' = (-2 + 3, 5 - 2) = (1, 3)",
      'Contoh Soal 3: Rotasi:',
      'Titik C(2, 1) diputar 90° berlawanan arah jarum jam terhadap titik pusat (0, 0). Tentukan koordinat hasil rotasi.',
      'Penyelesaian:',
      "(x, y) → (-y, x) sehingga C' = (-1, 2)",
      'Contoh Soal 4: Dilatasi:',
      'Titik D(4, -3) didilatasi dengan faktor skala 2 terhadap titik pusat (0, 0). Tentukan koordinat hasil dilatasi.',
      'Penyelesaian:',
      "D' = (8, -6)"
    ]
  },
  {
    id: 'latihan',
    title: '📝 Latihan Soal',
    color: 'latihan',
    text: [
      'Tentukan bayangan titik berikut:',
      'a. Refleksi titik E(5, -2) terhadap sumbu y',
      'b. Translasi titik F(0, 0) oleh vektor (-3, 4)',
      'c. Rotasi titik G(-1, 2) sebesar 180° terhadap titik pusat (0, 0)',
      'd. Dilatasi titik H(6, -1) dengan faktor skala 0.5',
      'Jelaskan perbedaan antara translasi dan rotasi dalam hal perubahan posisi dan orientasi bangun.',
      'Buatlah sketsa sederhana dari hasil refleksi dan rotasi titik A(2, 3) terhadap sumbu x dan rotasi 90°.'
    ]
  },
  {
    id: 'refleksi',
    title: '🔍 Refleksi Pembelajaran',
    color: 'refleksi',
    text: [
      'Jenis transformasi mana yang menurutmu paling mudah dipahami dan mengapa?',
      'Bagaimana transformasi geometri digunakan dalam kehidupan nyata, misalnya dalam desain grafis atau arsitektur?'
    ]
  }
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
