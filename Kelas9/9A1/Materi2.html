<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ‚úÖ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">üìò Materi 2</div>

  <button class="pemantik active">üí° Pemantik</button>
  <button class="kontekstual">üåç Kontekstual</button>
  <button class="tujuan">üéØ Tujuan</button>
  <button class="aktivitas">üìö Aktivitas</button>
  <button class="konsep">üßÝ Konsep</button>
  <button class="contoh">‚úçÔ∏è Contoh</button>
  <button class="latihan">üìù Latihan</button>
  <button class="refleksi">üîç Refleksi</button>

  <button class="nav" onclick="prevCol()">‚óÄ Back</button>
  <button class="nav" onclick="nextCol()"> Next ‚ñ∂</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1‚Äì2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
  {
    id: 'pemantik',
    title: 'üí° Pemantik',
    color: 'pemantik',
    text: [
      'Pernahkah kamu melihat penulisan angka seperti 10‚Å∂ atau 10‚Åª¬≥ pada data sains, teknologi, atau media?',
      'Mengapa menurutmu satu bilangan berpangkat bisa ditulis dengan cara berbeda tetapi tetap memiliki makna yang sama?'
    ]
  },
  {
    id: 'kontekstual',
    title: 'üåç Penerapan Kontekstual',
    color: 'kontekstual',
    text: [
      'Membaca jarak antarkota, ukuran populasi, atau kapasitas data yang ditulis dalam bentuk bilangan berpangkat.',
      'Memahami penggunaan pangkat negatif pada ukuran yang sangat kecil, seperti ketebalan benda atau ukuran mikro.',
      'Menyederhanakan perhitungan berulang pada angka besar agar lebih mudah dibaca dan dihitung.',
      'Menggunakan aturan pangkat untuk mempercepat perhitungan dalam teknologi dan ilmu pengetahuan.'
    ]
  },
  {
    id: 'tujuan',
    title: 'üéØ Tujuan Pembelajaran',
    color: 'tujuan',
    text: [
      'Siswa dapat mengidentifikasi dan menggunakan sifat-sifat bilangan berpangkat bulat positif dan negatif dalam menyelesaikan masalah.'
    ]
  },
  {
    id: 'aktivitas',
    title: 'üìö Aktivitas Inti',
    color: 'aktivitas',
    text: [
      'Mengamati contoh bilangan berpangkat positif dan negatif yang ditampilkan guru atau dari sumber belajar.',
      'Berdiskusi dalam kelompok untuk menemukan pola perubahan hasil saat operasi bilangan berpangkat dilakukan.',
      'Mengerjakan latihan terstruktur untuk menerapkan sifat-sifat bilangan berpangkat.',
      'Membandingkan dan membahas hasil pekerjaan antar kelompok secara aktif.'
    ]
  },
  {
    id: 'konsep',
    title: 'üßÝ Pemahaman Konsep',
    color: 'konsep',
    text: [
      '1. Bilangan Berpangkat Bulat Positif:',
      'Jika a adalah bilangan real dan n adalah bilangan bulat positif, maka:',
      'a‚Åø = a √ó a √ó ... √ó a',
      '(n kali)',
      '2. Bilangan Berpangkat Bulat Negatif:',
      'Jika a ‚âÝ 0 dan n adalah bilangan bulat positif, maka:',
      'a‚Åª‚Åø = 1 / a‚Åø',
      '3. Sifat-Sifat Penting:',
      'a·µê √ó a‚Åø = a·µê‚Å∫‚Åø',
      'a·µê / a‚Åø = a·µê‚Åª‚Åø',
      '(a·µê)‚Åø = a·µê √ó ‚Åø',
      'a‚Å∞ = 1 (untuk a ‚âÝ 0)',
      'a‚Åª‚Åø = 1 / a‚Åø'
    ]
  },
  {
    id: 'contoh',
    title: '‚úçÔ∏è Contoh Soal',
    color: 'contoh',
    text: [
      'Contoh Soal 1: Pangkat Positif:',
      'Hitung hasil dari 5¬≥ √ó 5¬≤',
      'Penyelesaian:',
      '5¬≥ √ó 5¬≤ = 5¬≥‚Å∫¬≤ = 5‚Åµ = 3125',
      'Contoh Soal 2: Pangkat Negatif:',
      'Sederhanakan 2‚Åª¬≥ / 2‚Åª¬π',
      'Penyelesaian:',
      '2‚Åª¬≥ / 2‚Åª¬π = 2‚Åª¬≥ ‚àí (‚àí1) = 2‚Åª¬≤ = 1 / 2¬≤ = 1/4'
    ]
  },
  {
    id: 'latihan',
    title: 'üìù Latihan Soal',
    color: 'latihan',
    text: [
      'Sederhanakan:',
      'a. 3‚Å¥ √ó 3¬≤',
      'b. 7‚Åµ / 7¬≤',
      'c. (2¬≥)¬≤',
      'd. 10‚Åª¬≤',
      'Hitung nilai dari:',
      'a. 5‚Åª¬π / 5‚Åª¬≥',
      'b. (4‚Åª¬≤) √ó (4¬≥)',
      'Jelaskan mengapa a‚Å∞ = 1 untuk a ‚âÝ 0, dan berikan contoh.'
    ]
  },
  {
    id: 'refleksi',
    title: 'üîç Refleksi Pembelajaran',
    color: 'refleksi',
    text: [
      'Apa perbedaan antara bilangan berpangkat positif dan negatif?',
      'Bagaimana sifat-sifat bilangan berpangkat membantu menyederhanakan perhitungan?'
    ]
  }
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ‚úÖ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ‚úÖ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ‚úÖ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ‚úÖ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
