<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 18</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
  {
    id: 'pemantik',
    title: '💡 Pemantik',
    color: 'pemantik',
    text: [
      'Pernahkah kamu melihat perubahan posisi suatu gambar pada peta, desain, atau animasi digital?',
      'Mengapa menurutmu satu masalah nyata bisa melibatkan lebih dari satu jenis transformasi geometri?'
    ]
  },
  {
    id: 'kontekstual',
    title: '🌍 Penerapan Kontekstual',
    color: 'kontekstual',
    text: [
      'Menentukan posisi objek pada peta digital yang mengalami pergeseran atau perputaran.',
      'Mengamati perubahan posisi dan ukuran gambar dalam desain logo atau poster.',
      'Memahami pergerakan objek pada animasi, game, atau simulasi digital.',
      'Menafsirkan bentuk dan posisi bangunan pada denah atau perencanaan ruang.'
    ]
  },
  {
    id: 'tujuan',
    title: '🎯 Tujuan Pembelajaran',
    color: 'tujuan',
    text: [
      'Siswa dapat menyelesaikan masalah kontekstual yang melibatkan refleksi, translasi, rotasi, dan dilatasi, serta menafsirkan hasil transformasi dalam konteks kehidupan nyata.'
    ]
  },
  {
    id: 'aktivitas',
    title: '📚 Aktivitas Inti',
    color: 'aktivitas',
    text: [
      'Mengamati permasalahan kontekstual yang melibatkan perubahan posisi atau ukuran bangun.',
      'Berdiskusi dalam kelompok untuk menentukan jenis transformasi yang sesuai.',
      'Mengerjakan latihan menyelesaikan masalah kontekstual transformasi geometri.',
      'Menyajikan hasil penyelesaian dan membahas strategi yang digunakan bersama teman.'
    ]
  },
  {
    id: 'konsep',
    title: '🧠 Pemahaman Konsep',
    color: 'konsep',
    text: [
      'Masalah kontekstual dalam transformasi geometri mengajak siswa:',
      'Mengidentifikasi jenis transformasi yang terjadi.',
      'Menggunakan rumus transformasi untuk menyelesaikan soal.',
      'Menafsirkan hasil transformasi dalam konteks nyata, misalnya desain, peta, animasi, atau arsitektur.',
      'Transformasi dapat terjadi secara tunggal atau gabungan, dan dapat diterapkan pada titik maupun bangun datar.'
    ]
  },
  {
    id: 'contoh',
    title: '✍️ Contoh Soal',
    color: 'contoh',
    text: [
      'Contoh Soal 1: Translasi dalam Desain:',
      'Sebuah logo berbentuk segitiga dengan titik-titik A(2, 1), B(4, 1), dan C(3, 3) dipindahkan 5 satuan ke kanan dan 2 satuan ke atas. Tentukan koordinat hasil translasi.',
      'Penyelesaian:',
      'Vektor translasi: (5, 2)',
      'A menjadi (7, 3), B menjadi (9, 3), C menjadi (8, 5)',
      'Contoh Soal 2: Rotasi dalam Peta:',
      'Titik D(6, -2) mewakili posisi menara. Titik tersebut diputar 180° terhadap titik pusat (0, 0). Tentukan posisi baru menara.',
      'Penyelesaian:',
      "D' = (-6, 2)",
      'Contoh Soal 3: Dilatasi dalam Arsitektur:',
      'Sebuah denah bangunan diperkecil dengan faktor skala 0.25. Titik sudut bangunan E(8, 4) menjadi berapa?',
      'Penyelesaian:',
      "E' = (2, 1)"
    ]
  },
  {
    id: 'latihan',
    title: '📝 Latihan Soal',
    color: 'latihan',
    text: [
      'Sebuah bangun datar dengan titik-titik F(1, 2), G(3, 2), dan H(2, 4) direfleksikan terhadap sumbu y. Tentukan koordinat bayangan dan gambarkan hasilnya.',
      'Sebuah objek dalam animasi bergerak dari titik I(0, 0), J(2, 0), dan K(1, 2) dengan translasi vektor (-3, 1). Tentukan posisi baru objek.',
      'Sebuah logo diputar 90° berlawanan arah jarum jam terhadap titik pusat (0, 0). Titik awal L(4, -1). Tentukan posisi setelah rotasi.',
      'Jelaskan bagaimana kamu menentukan jenis transformasi yang sesuai untuk menyelesaikan masalah dalam desain atau pergerakan objek.'
    ]
  },
  {
    id: 'refleksi',
    title: '🔍 Refleksi Pembelajaran',
    color: 'refleksi',
    text: [
      'Dari keempat jenis transformasi, mana yang paling sering kamu temui dalam kehidupan sehari-hari?',
      'Bagaimana pemahaman transformasi geometri membantumu dalam bidang lain seperti seni, teknologi, atau ilmu pengetahuan?'
    ]
  }
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
