<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 3</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
  {
    id: 'pemantik',
    title: '💡 Pemantik',
    color: 'pemantik',
    text: [
      'Pernahkah kamu membandingkan ukuran dua gambar yang bentuknya sama, tetapi salah satu terlihat lebih besar?',
      'Jika diketahui satu ukuran pada gambar kecil, bagaimana caramu memperkirakan ukuran pada gambar yang lebih besar?'
    ]
  },
  {
    id: 'kontekstual',
    title: '🌍 Penerapan Kontekstual',
    color: 'kontekstual',
    text: [
      'Menentukan ukuran sebenarnya dari gambar denah atau peta yang dibuat berskala.',
      'Memperkirakan tinggi bangunan dari miniatur atau model yang diperbesar.',
      'Menghitung ukuran benda berdasarkan foto atau gambar yang diperkecil.',
      'Membandingkan ukuran dua benda yang bentuknya sama tetapi tidak berukuran sama.'
    ]
  },
  {
    id: 'tujuan',
    title: '🎯 Tujuan Pembelajaran',
    color: 'tujuan',
    text: [
      'Siswa mampu menggunakan prinsip kesebangunan untuk menentukan panjang sisi yang belum diketahui pada bangun datar melalui perbandingan sisi yang bersesuaian.'
    ]
  },
  {
    id: 'aktivitas',
    title: '📚 Aktivitas Inti',
    color: 'aktivitas',
    text: [
      'Mengamati pasangan bangun datar yang sebangun dengan ukuran berbeda.',
      'Berdiskusi dalam kelompok untuk menentukan sisi-sisi yang bersesuaian.',
      'Mengerjakan latihan menentukan panjang sisi yang belum diketahui menggunakan perbandingan.',
      'Membahas hasil perhitungan dan menanggapi strategi penyelesaian teman.'
    ]
  },
  {
    id: 'konsep',
    title: '🧠 Pemahaman Konsep',
    color: 'konsep',
    text: [
      'Dalam bangun sebangun, sisi-sisi yang bersesuaian memiliki perbandingan yang sama.',
      'Jika dua bangun sebangun, maka:',
      'sisi 1 pada bangun A / sisi 1 pada bangun B = sisi 2 pada bangun A / sisi 2 pada bangun B = ...',
      'Prinsip ini digunakan untuk menentukan panjang sisi yang belum diketahui.'
    ]
  },
  {
    id: 'contoh',
    title: '✍️ Contoh Soal',
    color: 'contoh',
    text: [
      'Contoh Soal 1:',
      'Segitiga ABC sebangun dengan DEF.',
      'AB = 6, BC = 8, AC = 10, dan DE = 9.',
      'Gunakan perbandingan: 6/9 = 8/x = 10/y',
      'Hasil: EF = 12 cm dan DF = 15 cm.',
      'Contoh Soal 2:',
      'Persegi panjang pertama: panjang 12 cm, lebar 8 cm.',
      'Persegi panjang kedua: lebar 6 cm.',
      'Perbandingan: 8 : 6 = 4 : 3',
      'Panjang kedua = 12 × (3/4) = 9 cm.'
    ]
  },
  {
    id: 'latihan',
    title: '📝 Latihan Soal',
    color: 'latihan',
    text: [
      'Dua segitiga sebangun dengan sisi 5, 7, 9 dan sisi pertama segitiga kedua 10 cm. Tentukan sisi lainnya.',
      'Persegi panjang A (15 cm × 10 cm) sebangun dengan B. Jika panjang B = 12 cm, tentukan lebarnya.',
      'Buat dua bangun sebangun dan hitung sisi yang belum diketahui.'
    ]
  },
  {
    id: 'refleksi',
    title: '🔍 Refleksi Pembelajaran',
    color: 'refleksi',
    text: [
      'Bagaimana memastikan dua bangun benar-benar sebangun?',
      'Apa manfaat kesebangunan dalam kehidupan sehari-hari?',
      'Apa kesulitan yang kamu temui saat menentukan sisi yang belum diketahui?'
    ]
  }
];


let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
